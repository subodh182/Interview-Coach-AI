<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewAI – Dashboard</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">

  <div class="noise-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">⬡</span>
      <span>Interview<span class="accent">AI</span></span>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📊</span><span>Dashboard</span></a>
      <a href="setup.html" class="nav-item"><span class="nav-icon">🎯</span><span>Start Interview</span></a>
      <a href="history.html" class="nav-item"><span class="nav-icon">📋</span><span>History</span></a>
      <a href="leaderboard.html" class="nav-item"><span class="nav-icon">🏆</span><span>Leaderboard</span></a>
      <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
    </nav>

    <div class="sidebar-footer">
      <button class="theme-toggle sidebar-theme" id="sidebarThemeToggle">
        <span class="theme-icon">☽</span>
        <span>Toggle Theme</span>
      </button>
      <button class="logout-btn" id="logoutBtn">
        <span>🚪</span>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main Layout -->
  <div class="main-layout">

    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger-sidebar" id="sidebarToggle">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-greeting">
          <span id="greetingText">Good morning</span>,
          <span id="userName" class="accent">Loading...</span>
        </div>
      </div>

      <div class="topbar-right">
        <button class="theme-toggle" id="topThemeToggle"><span class="theme-icon">☽</span></button>
        <a href="setup.html" class="btn-primary"><span>+</span> New Interview</a>
        <div class="user-avatar" id="userAvatar">U</div>
      </div>
    </header>

    <main class="main-content">

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-icon blue">🎤</div>
          <div class="stat-card-info">
            <span class="stat-card-num" id="totalInterviews">0</span>
            <span class="stat-card-label">Total Interviews</span>
          </div>
          <div class="stat-card-trend up" id="interviewTrend">+0%</div>
        </div>

        <div class="stat-card">
          <div class="stat-card-icon green">⭐</div>
          <div class="stat-card-info">
            <span class="stat-card-num" id="avgScore">0%</span>
            <span class="stat-card-label">Avg Score</span>
          </div>
          <div class="stat-card-trend up" id="scoreTrend">+0%</div>
        </div>

        <div class="stat-card">
          <div class="stat-card-icon purple">🔥</div>
          <div class="stat-card-info">
            <span class="stat-card-num" id="streakDays">0</span>
            <span class="stat-card-label">Day Streak</span>
          </div>
          <div class="stat-card-trend neutral" id="streakLabel">Keep it up!</div>
        </div>

        <div class="stat-card">
          <div class="stat-card-icon yellow">🏅</div>
          <div class="stat-card-info">
            <span class="stat-card-num" id="rankNum">#--</span>
            <span class="stat-card-label">Your Rank</span>
          </div>
          <div class="stat-card-trend neutral">Leaderboard</div>
        </div>
      </div>

      <!-- Charts -->
      <div class="dashboard-grid">

        <div class="dash-card wide">
          <div class="dash-card-header">
            <h3>Performance Over Time</h3>
          </div>
          <div class="chart-wrap">
            <canvas id="performanceChart"></canvas>
          </div>
        </div>

        <div class="dash-card">
          <div class="dash-card-header">
            <h3>Skills Analysis</h3>
          </div>
          <div class="chart-wrap radar-wrap">
            <canvas id="skillsChart"></canvas>
          </div>
        </div>

      </div>

    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase SDK -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

    import {
      getAuth,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    import {
      getDatabase,
      ref,
      get,
      query,
      orderByChild,
      limitToLast,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";


    const firebaseConfig = {
      apiKey: "AIzaSyAmE3LJp-zxkcWwXCB1mwAjmU24KfUHwRI",
      authDomain: "interviewai-82be8.firebaseapp.com",
      projectId: "interviewai-82be8",
      databaseURL: "https://interviewai-82be8-default-rtdb.asia-southeast1.firebasedatabase.app",
      storageBucket: "interviewai-82be8.firebasestorage.app",
      messagingSenderId: "1037102407872",
      appId: "1:1037102407872:web:5e81fd954f6fc094824d25"
    };


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);


    window.firebaseAuth = auth;
    window.firebaseDB = db;

    window.firebaseFunctions = {
      signOut,
      ref,
      get,
      query,
      orderByChild,
      limitToLast,
      onValue
    };


    auth.onAuthStateChanged((user) => {

      if (!user) {
        window.location.href = 'auth.html';
      } else {
        window.currentUser = user;
        window.dispatchEvent(new CustomEvent('userReady', { detail: user }));
      }

    });

  </script>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
