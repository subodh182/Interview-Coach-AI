<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterviewAI – Leaderboard</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/leaderboard.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="dark-mode">
  <div class="noise-overlay"></div>
  <nav class="report-nav">
    <a href="dashboard.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Dashboard
    </a>
    <div class="nav-brand">⬡ Interview<span class="accent">AI</span></div>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>

  <div class="lb-container">
    <div class="lb-header">
      <span class="section-tag">Rankings</span>
      <h2>🏆 Global <span class="gradient-text">Leaderboard</span></h2>
      <p>Top performers this week. Compete and climb the ranks!</p>
    </div>

    <!-- Your Rank Card -->
    <div class="your-rank-card hidden" id="yourRankCard">
      <span class="yr-label">Your Rank</span>
      <div class="yr-content">
        <div class="yr-avatar" id="yrAvatar">U</div>
        <div class="yr-info">
          <span class="yr-name" id="yrName">You</span>
          <span class="yr-stats" id="yrStats">0 interviews · 0% avg</span>
        </div>
        <div class="yr-rank" id="yrRank">#--</div>
        <div class="yr-score" id="yrScore">0%</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="lb-filters">
      <button class="lb-filter active" data-filter="week">This Week</button>
      <button class="lb-filter" data-filter="month">This Month</button>
      <button class="lb-filter" data-filter="all">All Time</button>
      <select class="lb-role-filter" id="roleFilter">
        <option value="">All Roles</option>
        <option value="frontend">Frontend</option>
        <option value="backend">Backend</option>
        <option value="java">Java</option>
        <option value="python">Python</option>
        <option value="hr">HR</option>
      </select>
    </div>

    <!-- Podium -->
    <div class="podium" id="podium">
      <div class="podium-loading"><div class="spinner"></div></div>
    </div>

    <!-- Full List -->
    <div class="lb-list" id="lbList">
      <div class="lb-loading"><div class="spinner"></div><span>Loading rankings...</span></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY", authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID", appId: "YOUR_APP_ID"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.firebaseAuth = auth;
    window.firebaseDB = db;
    window.firebaseFunctions = { collection, query, orderBy, limit, getDocs, where };
    auth.onAuthStateChanged(user => {
      window.currentUser = user;
      window.dispatchEvent(new CustomEvent('userReady', { detail: user }));
    });
  </script>
  <script src="js/main.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
